<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperNode Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#020810;">
<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = "https://super-nodes-production-7fc4.up.railway.app";

async function apiFetch(path) {
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      headers: { "Accept": "application/json" },
      signal: AbortSignal.timeout(5000),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const ct = res.headers.get("content-type") || "";
    if (ct.includes("application/json")) return await res.json();
    return await res.text();
  } catch (e) { return null; }
}

function fmt(n) {
  if (n == null) return "—";
  if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(0) + "K";
  return String(n);
}

const REGIONS = [
  { id:"NA_E", label:"N. America E", x:180, y:140, color:"#00ff88", nodes:1_200_000_000 },
  { id:"NA_W", label:"N. America W", x:120, y:130, color:"#00ff88", nodes:800_000_000 },
  { id:"SA",   label:"S. America",   x:210, y:280, color:"#ffcc00", nodes:450_000_000 },
  { id:"EU_W", label:"Europe W",     x:380, y:110, color:"#00cfff", nodes:750_000_000 },
  { id:"EU_E", label:"Europe E",     x:450, y:120, color:"#00cfff", nodes:300_000_000 },
  { id:"AF",   label:"Africa",       x:420, y:240, color:"#ff9500", nodes:500_000_000 },
  { id:"ME",   label:"Middle East",  x:500, y:170, color:"#ff9500", nodes:220_000_000 },
  { id:"SA2",  label:"S. Asia",      x:580, y:185, color:"#bf7fff", nodes:1_800_000_000 },
  { id:"EA",   label:"E. Asia",      x:680, y:145, color:"#bf7fff", nodes:1_600_000_000 },
  { id:"SEA",  label:"SE Asia",      x:660, y:230, color:"#ff5599", nodes:700_000_000 },
  { id:"OCE",  label:"Oceania",      x:720, y:320, color:"#ff5599", nodes:30_000_000 },
  { id:"ORB",  label:"Orbital",      x:550, y:50,  color:"#ffffff", nodes:1_000_000 },
];

const ROUTES = [
  ["NA_E","EU_W"],["NA_E","NA_W"],["EU_W","EU_E"],["EU_W","AF"],
  ["EU_E","ME"],["ME","SA2"],["SA2","EA"],["SA2","SEA"],
  ["EA","SEA"],["EA","OCE"],["NA_E","SA"],["AF","ME"],
  ["ORB","NA_E"],["ORB","EA"],["ORB","EU_W"],
];

const CYCLE_MS = 5000;

const ALGOS = [
  {
    id:"dijkstra", label:"Dijkstra", icon:"⚡", color:"#00ff88",
    desc:"Shortest weighted path. O((V+E)log V). Every packet uses this to find the optimal hop sequence.",
    simulate(set) {
      const route = ["NA_W","NA_E","EU_W","EU_E","ME","SA2","EA"];
      set({ route, step:0, gossip:[], mst:[], bfs:[], log:["Dijkstra: routing NA_W → EA"] });
      let s=0;
      return setInterval(() => {
        s = Math.min(s+1, route.length-1);
        set(p => ({ ...p, step:s, log:[`Hop ${s}: ${route[s-1]} → ${s<route.length?route[s]:"DELIVERED ✓"}`,...p.log].slice(0,12) }));
      }, 550);
    }
  },
  {
    id:"astar", label:"A* Search", icon:"🎯", color:"#00cfff",
    desc:"Dijkstra + Haversine heuristic. Geo-aware routing. 10–50× faster by exploring nodes closest to destination first.",
    simulate(set) {
      const route = ["NA_W","NA_E","EU_W","EU_E","ME","SA2","EA"];
      set({ route, step:0, gossip:[], mst:[], bfs:[], log:["A*: geo-aware route NA_W → EA","Heuristic: Haversine distance"] });
      let s=0;
      return setInterval(() => {
        s = Math.min(s+1, route.length-1);
        set(p => ({ ...p, step:s, log:[`A* hop ${s}: ${route[s-1]} h=${(Math.random()*30+5).toFixed(0)}ms`,...p.log].slice(0,12) }));
      }, 500);
    }
  },
  {
    id:"bfs", label:"BFS Discovery", icon:"🔍", color:"#ff9500",
    desc:"Layer-by-layer flood from source. O(V+E). Used when a new node joins and needs to build its neighbor table.",
    simulate(set) {
      const order = ["EU_W","EU_E","AF","NA_E","ME","NA_W","SA","SA2","ORB","EA","SEA","OCE"];
      set({ route:[], step:0, gossip:[], mst:[], bfs:[], log:["BFS topology discovery from EU_W"] });
      let s=0;
      return setInterval(() => {
        s = Math.min(s+1, order.length);
        set(p => ({ ...p, bfs:order.slice(0,s), log:[`Layer ${s}: discovered ${order[s-1]||"all"}`,...p.log].slice(0,12) }));
      }, 370);
    }
  },
  {
    id:"kruskal", label:"Kruskal MST", icon:"🌲", color:"#bf7fff",
    desc:"Minimum Spanning Tree via sorted edges + Union-Find DSU. Builds cheapest backbone connecting all SuperNodes.",
    simulate(set) {
      const edges = ROUTES.slice(0,12);
      set({ route:[], step:0, gossip:[], mst:[], bfs:[], log:["Kruskal MST: building backbone","Parallel edge sort (Rayon)..."] });
      let s=0;
      return setInterval(() => {
        s = Math.min(s+1, edges.length);
        set(p => ({ ...p, mst:edges.slice(0,s), log:[`MST edge ${s}: ${edges[s-1]?.[0]||"done"} — ${edges[s-1]?.[1]||""}`,...p.log].slice(0,12) }));
      }, 280);
    }
  },
  {
    id:"gossip", label:"Gossip Protocol", icon:"📢", color:"#ff5599",
    desc:"Epidemic broadcast with fanout=6. Reaches ALL 8B nodes in ceil(log₆(8B)) ≈ 12 rounds.",
    simulate(set) {
      const waves = [
        ["EA"],
        ["EA","SEA","SA2","NA_E","EU_W","ORB"],
        ["EA","SEA","SA2","NA_E","EU_W","ORB","OCE","ME","EU_E","NA_W","AF","SA"],
      ];
      set({ route:[], step:0, gossip:waves[0], mst:[], bfs:[], log:["Gossip broadcast from EA","Fanout = 6 peers"] });
      let w=0;
      return setInterval(() => {
        w = Math.min(w+1, waves.length-1);
        set(p => ({ ...p, gossip:waves[w], log:[w<waves.length-1?`Round ${w+1}: ${waves[w].length} nodes reached`:"ALL 8B NODES REACHED ✓",...p.log].slice(0,12) }));
      }, 950);
    }
  },
  {
    id:"bgp", label:"BGP Policy", icon:"🛡️", color:"#ff3366",
    desc:"Border Gateway Protocol. Routes based on AS policies, not just shortest path. Core of internet transit.",
    simulate(set) {
      const route = ["EA","SEA","OCE","AF","ME"];
      set({ route, step:0, gossip:[], mst:[], bfs:[], log:["BGP: policy routing EA → ME","DENY transit: SA2 (policy block)"] });
      let s=0;
      return setInterval(() => {
        s = Math.min(s+1, route.length-1);
        set(p => ({ ...p, step:s, log:[`BGP AS path +${route[s]}`,...p.log].slice(0,12) }));
      }, 650);
    }
  },
  {
    id:"ecmp", label:"ECMP Parallel", icon:"🔀", color:"#00ccff",
    desc:"Equal-Cost Multi-Path. Splits traffic across multiple parallel paths simultaneously to multiply bandwidth.",
    simulate(set) {
      const pathA = ["NA_W","NA_E","EU_W","EU_E"];
      const pathB = ["NA_W","NA_E","SA","AF","EU_E"];
      set({ route:pathA, step:0, gossip:[], mst:[], bfs:[], log:["ECMP: 2 equal-cost paths found","Splitting traffic 50% / 50%"] });
      let c=0;
      return setInterval(() => {
        c++;
        const route = c%2===0 ? pathA : pathB;
        set(p => ({ ...p, route, step:c%route.length, log:[`Flow ${c%2===0?"A (north)":"B (south)"}: 50% load`,...p.log].slice(0,12) }));
      }, 520);
    }
  },
  {
    id:"aco", label:"Ant Colony", icon:"🐜", color:"#aadd00",
    desc:"Bio-inspired routing. Packets leave a digital pheromone on fast paths, pulling traffic to the fastest real-time routes.",
    simulate(set) {
      set({ route:["NA_W","NA_E","EU_W"], step:0, gossip:[], mst:[], bfs:[], log:["ACO: congestion at NA_E detected","Sending scout ants..."] });
      let i=0;
      return setInterval(() => {
        i++;
        if (i<=3) {
          set(p => ({ ...p, route:["NA_W","NA_E","EU_W"], step:i%3, log:[`Ant ${i}: NA_E route — high latency, pheromone -2`,...p.log].slice(0,12) }));
        } else {
          set(p => ({ ...p, route:["NA_W","SA","AF","EU_W"], step:(i-3)%4, log:[`Ant ${i}: SA route faster! pheromone +3`,...p.log].slice(0,12) }));
        }
      }, 520);
    }
  },
];

// ── Status dot ────────────────────────────────────────────
function StatusDot({ status }) {
  const color = status==="online"?"#00ff88":status==="checking"?"#ffcc00":"#ff3366";
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:5 }}>
      <span style={{ width:8, height:8, borderRadius:"50%", background:color,
        boxShadow:`0 0 6px ${color}`, display:"inline-block",
        animation:status==="checking"?"blink 1s infinite":"none" }}/>
      <span style={{ color, fontSize:10, letterSpacing:2, fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>
        {status.toUpperCase()}
      </span>
    </span>
  );
}

function MetricCard({ label, value, sub, color, live }) {
  return (
    <div style={{ background:"#030d18", border:`1px solid ${live?color+"33":"#0a2030"}`,
      borderRadius:6, padding:"12px 14px", transition:"border-color 0.3s" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
        <span style={{ fontSize:10, color:"#2a5060", letterSpacing:1 }}>{label}</span>
        <span style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:18, fontWeight:700, color,
          textShadow:live?`0 0 12px ${color}55`:"none" }}>{value}</span>
      </div>
      {sub && <div style={{ fontSize:9, color:"#1a3040", marginTop:2 }}>{sub}</div>}
    </div>
  );
}

// ── Simulate Tab ──────────────────────────────────────────
function SimulateTab() {
  const [algoIdx,   setAlgoIdx]   = useState(0);
  const [autoCycle, setAutoCycle] = useState(true);
  const [progress,  setProgress]  = useState(0);
  const [simState,  setSimState]  = useState({ route:[], step:0, gossip:[], mst:[], bfs:[], log:["Press RESUME or select an algorithm"] });

  const simRef      = useRef(null);
  const cycleRef    = useRef(null);
  const progressRef = useRef(null);
  const idxRef      = useRef(0);

  const runAlgo = useCallback((idx) => {
    clearInterval(simRef.current);
    clearInterval(progressRef.current);
    idxRef.current = idx;
    setProgress(0);
    setAlgoIdx(idx);
    simRef.current = ALGOS[idx].simulate(setSimState);
    let p = 0;
    progressRef.current = setInterval(() => {
      p++;
      setProgress(p);
      if (p >= 100) clearInterval(progressRef.current);
    }, CYCLE_MS / 100);
  }, []);

  useEffect(() => {
    if (!autoCycle) { clearInterval(cycleRef.current); return; }
    runAlgo(idxRef.current);
    cycleRef.current = setInterval(() => {
      const next = (idxRef.current + 1) % ALGOS.length;
      runAlgo(next);
    }, CYCLE_MS);
    return () => { clearInterval(cycleRef.current); clearInterval(simRef.current); clearInterval(progressRef.current); };
  }, [autoCycle, runAlgo]);

  const selectAlgo = (idx) => {
    setAutoCycle(false);
    runAlgo(idx);
  };

  const algo = ALGOS[algoIdx];
  const { route, step, gossip, mst, bfs } = simState;

  const getColor = (id) => {
    if (gossip.includes(id)) return "#ff5599";
    if (bfs.includes(id))    return "#ff9500";
    if (route.includes(id) && route.indexOf(id) <= step) return algo.color;
    return REGIONS.find(r=>r.id===id)?.color || "#1a4060";
  };

  const isActive = (id) =>
    gossip.includes(id) || bfs.includes(id) ||
    (route.includes(id) && route.indexOf(id) <= step);

  const isPathEdge = (a,b) => {
    for (let i=0; i<step; i++) {
      if ((route[i]===a&&route[i+1]===b)||(route[i]===b&&route[i+1]===a)) return true;
    }
    return false;
  };

  const isMstEdge = (a,b) => mst.some(e=>(e[0]===a&&e[1]===b)||(e[0]===b&&e[1]===a));

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 290px", gap:16 }}>

      {/* Left: map */}
      <div>
        {/* Banner */}
        <div style={{ background:"#030d18", border:`1px solid ${algo.color}33`,
          borderRadius:"8px 8px 0 0", padding:"12px 16px",
          display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <span style={{ fontSize:24 }}>{algo.icon}</span>
            <div>
              <div style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:19, fontWeight:700,
                color:algo.color, letterSpacing:2 }}>{algo.label}</div>
              <div style={{ fontSize:10, color:"#2a6070", marginTop:2, maxWidth:420 }}>{algo.desc}</div>
            </div>
          </div>
          {/* Dot indicators */}
          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
            <div style={{ fontSize:9, color:"#1a4050", letterSpacing:1 }}>{algoIdx+1} / {ALGOS.length}</div>
            <div style={{ display:"flex", gap:4 }}>
              {ALGOS.map((_,i) => (
                <div key={i} onClick={() => selectAlgo(i)} style={{
                  width:20, height:5, borderRadius:3, cursor:"pointer",
                  background: i===algoIdx ? algo.color : i<algoIdx ? "#1a4050" : "#0a2030",
                  transition:"background 0.3s",
                  boxShadow: i===algoIdx ? `0 0 6px ${algo.color}` : "none"
                }}/>
              ))}
            </div>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{ height:3, background:"#0a2030" }}>
          <div style={{ height:"100%", background:`linear-gradient(90deg,${algo.color},${algo.color}66)`,
            width:`${progress}%`, transition:"width 0.1s linear", boxShadow:`0 0 8px ${algo.color}55` }}/>
        </div>

        {/* SVG map */}
        <div style={{ background:"#030d18", border:"1px solid #0a2030",
          borderRadius:"0 0 8px 8px", padding:14 }}>
          <svg viewBox="0 0 820 350" style={{ width:"100%" }}>
            <defs>
              <pattern id="g" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#040f1c" strokeWidth="0.5"/>
              </pattern>
            </defs>
            <rect width="820" height="350" fill="url(#g)"/>

            {ROUTES.map(([a,b],i) => {
              const ra=REGIONS.find(r=>r.id===a), rb=REGIONS.find(r=>r.id===b);
              if (!ra||!rb) return null;
              const path = isPathEdge(a,b);
              const mstE = isMstEdge(a,b);
              return (
                <g key={i}>
                  <line x1={ra.x} y1={ra.y} x2={rb.x} y2={rb.y}
                    stroke={path?algo.color:mstE?"#bf7fff":"#0a1e30"}
                    strokeWidth={path||mstE?2.5:1}/>
                  {path && (
                    <line x1={ra.x} y1={ra.y} x2={rb.x} y2={rb.y}
                      stroke={algo.color} strokeWidth="2" strokeDasharray="6 5" opacity="0.5"
                      style={{ animation:"dash 0.6s linear infinite" }}/>
                  )}
                </g>
              );
            })}

            {REGIONS.map(r => {
              const col = getColor(r.id);
              const active = isActive(r.id);
              return (
                <g key={r.id}>
                  {active && <circle cx={r.x} cy={r.y} r={26} fill={col} opacity="0.1"
                    style={{ animation:"ring 1.5s infinite" }}/>}
                  <circle cx={r.x} cy={r.y} r={15} fill="#040f1c" stroke={col}
                    strokeWidth={active?2.5:1.5}
                    style={active?{filter:`drop-shadow(0 0 8px ${col})`}:{}}/>
                  <text x={r.x} y={r.y+5} textAnchor="middle" fontSize="10" fill={col}>⚡</text>
                  <text x={r.x} y={r.y+28} textAnchor="middle" fontSize="8" fill={col} opacity="0.6">{r.label}</text>
                </g>
              );
            })}

            {route.length>0 && step>0 && step<route.length && (() => {
              const n = REGIONS.find(r=>r.id===route[step]);
              if (!n) return null;
              return (
                <g>
                  <circle cx={n.x} cy={n.y} r={11} fill={algo.color} opacity="0.2"/>
                  <circle cx={n.x} cy={n.y} r={5}  fill={algo.color}
                    style={{ filter:`drop-shadow(0 0 7px ${algo.color})` }}/>
                </g>
              );
            })()}
          </svg>
        </div>

        {/* Event log */}
        <div style={{ background:"#030d18", border:"1px solid #0a2030", borderRadius:6,
          padding:"10px 14px", marginTop:10, maxHeight:110, overflowY:"auto" }}>
          <div style={{ fontSize:9, color:"#1a4050", letterSpacing:2, marginBottom:5 }}>EVENT LOG</div>
          {simState.log.map((l,i) => (
            <div key={i} style={{ fontSize:10, padding:"2px 0", borderBottom:"1px solid #061520",
              color:i===0?algo.color:"#2a6070",
              animation:i===0?"fade-up 0.2s ease":"none" }}>{l}</div>
          ))}
        </div>
      </div>

      {/* Right: controls */}
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

        {/* Auto-cycle toggle */}
        <div style={{ background:"#030d18", border:"1px solid #0a2030", borderRadius:6, padding:"12px 14px" }}>
          <div style={{ fontSize:9, color:"#1a4050", letterSpacing:2, marginBottom:10 }}>AUTO CYCLE</div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
            <span style={{ fontSize:11, color:autoCycle?"#00ff88":"#2a6070" }}>
              {autoCycle ? "▶ Cycling all 8 algos" : "⏸ Manual mode"}
            </span>
            <button onClick={()=>setAutoCycle(v=>!v)} style={{
              background:autoCycle?"#003322":"#0a2030",
              border:`1px solid ${autoCycle?"#00ff88":"#1a4060"}`,
              color:autoCycle?"#00ff88":"#3a6070",
              padding:"5px 12px", cursor:"pointer", borderRadius:4,
              fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:12, letterSpacing:1
            }}>{autoCycle?"PAUSE":"RESUME"}</button>
          </div>
          {autoCycle && (
            <div style={{ fontSize:9, color:"#1a4050" }}>
              Next → <span style={{ color:ALGOS[(algoIdx+1)%ALGOS.length].color }}>
                {ALGOS[(algoIdx+1)%ALGOS.length].icon} {ALGOS[(algoIdx+1)%ALGOS.length].label}
              </span>
            </div>
          )}
        </div>

        {/* Algorithm list */}
        <div style={{ background:"#030d18", border:"1px solid #0a2030", borderRadius:6,
          padding:"8px 0", flex:1 }}>
          <div style={{ fontSize:9, color:"#1a4050", letterSpacing:2, padding:"0 12px 8px" }}>
            ALL ALGORITHMS
          </div>
          {ALGOS.map((a,i) => (
            <button key={a.id} onClick={()=>selectAlgo(i)} style={{
              display:"flex", alignItems:"center", gap:8, width:"100%",
              background:i===algoIdx?a.color+"0d":"none",
              border:"none", borderLeft:`3px solid ${i===algoIdx?a.color:"transparent"}`,
              color:i===algoIdx?a.color:"#2a6070",
              padding:"8px 12px", cursor:"pointer", textAlign:"left",
              fontFamily:"'Share Tech Mono',monospace", fontSize:11,
              transition:"all 0.15s",
            }}>
              <span style={{ fontSize:13 }}>{a.icon}</span>
              <span style={{ flex:1 }}>{a.label}</span>
              {i===algoIdx && (
                <span style={{ fontSize:8, color:a.color, letterSpacing:1,
                  animation:"blink 1.2s infinite" }}>
                  {autoCycle?"▶ NOW":"▶"}
                </span>
              )}
            </button>
          ))}
        </div>

        {/* Current stats */}
        <div style={{ background:"#030d18", border:`1px solid ${algo.color}22`, borderRadius:6, padding:"12px 14px" }}>
          <div style={{ fontSize:9, color:"#1a4050", letterSpacing:2, marginBottom:8 }}>CURRENT</div>
          {[
            ["Algorithm", algo.label],
            ["Index",     `${algoIdx+1} / ${ALGOS.length}`],
            ["Mode",      autoCycle?"Auto-cycle":"Manual"],
            ["Hops",      route.length>0?route.length:"—"],
            ["Step",      route.length>0?`${step} / ${route.length-1}`:"—"],
          ].map(([l,v]) => (
            <div key={l} style={{ display:"flex", justifyContent:"space-between",
              borderBottom:"1px solid #061520", padding:"5px 0", fontSize:11 }}>
              <span style={{ color:"#2a5060" }}>{l}</span>
              <span style={{ color:algo.color, fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────
function App() {
  const [tab, setTab]               = useState("overview");
  const [backendStatus, setStatus]  = useState("checking");
  const [liveData,  setLiveData]    = useState(null);
  const [topology,  setTopology]    = useState(null);
  const [packetStats,setPktStats]   = useState(null);
  const [lastUpdated,setLastUpd]    = useState(null);
  const [pulsePackets,setPulse]     = useState(false);
  const [simConns, setSimConns]     = useState(0);
  const [simPackets,setSimPackets]  = useState(0);

  const poll = useCallback(async () => {
    setStatus("checking");
    const [health, nodes, stats, topo] = await Promise.all([
      apiFetch("/health"), apiFetch("/api/nodes"),
      apiFetch("/api/stats"), apiFetch("/api/topology"),
    ]);
    if (health===null) { setStatus("offline"); return; }
    setStatus("online");
    setLastUpd(new Date().toLocaleTimeString());
    if (nodes && typeof nodes==="object") setLiveData(nodes);
    if (stats && typeof stats==="object") setPktStats(stats);
    if (topo  && typeof topo ==="object") setTopology(topo);
  }, []);

  useEffect(() => { poll(); const id=setInterval(poll,10_000); return ()=>clearInterval(id); }, [poll]);

  useEffect(() => {
    const target = liveData?.total_connections ?? 8_000_000_000;
    let v=0;
    const t = setInterval(() => {
      v = Math.min(v+48_000_000+Math.random()*25_000_000, target);
      setSimConns(Math.floor(v));
      if (v>=target) clearInterval(t);
    }, 60);
    return ()=>clearInterval(t);
  }, [liveData]);

  useEffect(() => {
    const base = packetStats?.packets_per_second ?? 900_000;
    const t = setInterval(() => {
      setPulse(true);
      setSimPackets(p=>p+Math.floor(base*0.1+Math.random()*base*0.05));
      setTimeout(()=>setPulse(false),200);
    }, 100);
    return ()=>clearInterval(t);
  }, [packetStats]);

  const connCount  = liveData?.total_connections ?? simConns;
  const nodeCount  = liveData?.node_count ?? 8_000_000_000;
  const superCount = liveData?.supernodes ?? 800;
  const pktRate    = packetStats?.packets_per_second ?? Math.floor(simPackets/Math.max(1,performance.now()/1000));
  const avgLatency = packetStats?.avg_latency_ms ?? 23;
  const cacheHit   = packetStats?.cache_hit_pct  ?? 99.1;
  const uptime     = liveData?.uptime_pct ?? 99.98;
  const isLive     = backendStatus==="online";

  return (
    <div style={{ background:"#020810", minHeight:"100vh", color:"#8ab4cc",
      fontFamily:"'Share Tech Mono',monospace", fontSize:13,
      display:"flex", flexDirection:"column" }}>
      <style>{`
        @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0.2} }
        @keyframes ring    { 0%,100%{opacity:0.1;r:26} 50%{opacity:0.2;r:32} }
        @keyframes dash    { to{stroke-dashoffset:-22} }
        @keyframes fade-up { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
        @keyframes glow-p  { 0%,100%{opacity:0.15} 50%{opacity:0.35} }
        ::-webkit-scrollbar { width:4px; background:#020810 }
        ::-webkit-scrollbar-thumb { background:#0d3050 }
        .tab { background:none; border:none; color:#2a6080; font-family:'Rajdhani',sans-serif;
               font-size:13px; font-weight:700; letter-spacing:2px; padding:10px 18px; cursor:pointer;
               border-bottom:2px solid transparent; transition:all 0.2s; }
        .tab:hover { color:#5599bb }
        .tab.on { color:#00ff88; border-bottom-color:#00ff88 }
        .trow { display:flex; justify-content:space-between; align-items:center;
                border-bottom:1px solid #061520; padding:8px 0; font-size:11px; }
      `}</style>

      {/* Header */}
      <div style={{ padding:"10px 24px", borderBottom:"1px solid #061520", background:"#020c18",
        display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
          <span style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:22, fontWeight:700,
            color:"#00ff88", letterSpacing:5 }}>⚡ SUPERNODE</span>
          <div style={{ width:1, height:24, background:"#0a2030" }}/>
          <StatusDot status={backendStatus}/>
          {lastUpdated && <span style={{ fontSize:9, color:"#1a4050", letterSpacing:1 }}>SYNCED {lastUpdated}</span>}
        </div>
        <div style={{ display:"flex", gap:28, alignItems:"center" }}>
          {[
            { label:"CONNECTIONS", value:fmt(connCount), color:"#00ff88" },
            { label:"PACKETS/S",   value:fmt(pktRate),   color:pulsePackets?"#ffff00":"#00cfff" },
            { label:"SUPERNODES",  value:String(superCount), color:"#ff9500" },
            { label:"UPTIME",      value:uptime+"%",     color:"#bf7fff" },
          ].map(s => (
            <div key={s.label} style={{ textAlign:"center" }}>
              <div style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:18, fontWeight:700,
                color:s.color, textShadow:`0 0 10px ${s.color}44`, transition:"color 0.2s" }}>{s.value}</div>
              <div style={{ fontSize:9, color:"#1a5060", letterSpacing:1 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ borderBottom:"1px solid #061520", background:"#020c18", display:"flex" }}>
        {[["overview","🌐 OVERVIEW"],["simulate","▶ SIMULATE"],["live","📡 LIVE DATA"],["debug","🔧 DEBUG"]].map(([id,label]) => (
          <button key={id} className={`tab ${tab===id?"on":""}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ flex:1, overflow:"auto", padding:"20px 24px" }}>

        {tab==="overview" && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 300px", gap:20 }}>
            <div style={{ background:"#030d18", border:"1px solid #0a2030", borderRadius:8, padding:16 }}>
              <div style={{ fontSize:10, color:"#1a5060", letterSpacing:2, marginBottom:12 }}>
                GLOBAL MESH — {REGIONS.length} REGIONS — {superCount} SUPERNODES
              </div>
              <svg viewBox="0 0 820 380" style={{ width:"100%" }}>
                <defs>
                  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
                    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#040f1c" strokeWidth="0.5"/>
                  </pattern>
                </defs>
                <rect width="820" height="380" fill="url(#grid)"/>
                {ROUTES.map(([a,b],i) => {
                  const ra=REGIONS.find(r=>r.id===a), rb=REGIONS.find(r=>r.id===b);
                  if (!ra||!rb) return null;
                  return <line key={i} x1={ra.x} y1={ra.y} x2={rb.x} y2={rb.y} stroke="#0d2535" strokeWidth="1"/>;
                })}
                {REGIONS.map(r => (
                  <g key={r.id}>
                    <circle cx={r.x} cy={r.y} r={20} fill="none" stroke={r.color}
                      strokeWidth="1" strokeOpacity="0.15" style={{ animation:"glow-p 3s infinite" }}/>
                    <circle cx={r.x} cy={r.y} r={14} fill="#040f1c" stroke={r.color} strokeWidth="1.5" strokeOpacity="0.7"/>
                    <text x={r.x} y={r.y+4} textAnchor="middle" fontSize="9" fill={r.color} opacity="0.9">⚡</text>
                    <text x={r.x} y={r.y+26} textAnchor="middle" fontSize="8" fill={r.color} opacity="0.5">{r.label}</text>
                    <text x={r.x} y={r.y+37} textAnchor="middle" fontSize="7" fill={r.color} opacity="0.35">{fmt(r.nodes)}</text>
                  </g>
                ))}
              </svg>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {backendStatus==="offline" && (
                <div style={{ background:"#1a0505", border:"1px solid #ff336633", borderRadius:6,
                  padding:"10px 14px", fontSize:11, color:"#ff5566" }}>
                  ⚠ Backend offline. Showing simulated data.
                </div>
              )}
              {[
                { label:"Total Devices",   value:fmt(nodeCount),    color:"#00ff88", sub:"worldwide",        live:isLive },
                { label:"Connections",     value:fmt(connCount),    color:"#00cfff", sub:"active now",       live:isLive },
                { label:"Packets/sec",     value:fmt(pktRate),      color:"#ff9500", sub:"routed/sec",       live:isLive },
                { label:"Avg Latency",     value:avgLatency+"ms",   color:"#bf7fff", sub:"end-to-end",       live:isLive },
                { label:"Route Cache Hit", value:cacheHit+"%",      color:"#ffcc00", sub:"Dijkstra on miss", live:isLive },
                { label:"SuperNodes",      value:String(superCount),color:"#ff5599", sub:"10M conns each",   live:isLive },
                { label:"Shards",          value:"65,536",          color:"#00ff88", sub:"122K nodes/shard", live:false },
                { label:"Gossip Rounds",   value:"12",              color:"#00cfff", sub:"to reach 8B nodes",live:false },
              ].map(s => <MetricCard key={s.label} {...s}/>)}
            </div>
          </div>
        )}

        {tab==="simulate" && <SimulateTab/>}

        {tab==="live" && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
            {[
              { title:"NODE DATA  /api/nodes",      data:liveData,     color:"#00ff88" },
              { title:"PACKET STATS  /api/stats",   data:packetStats,  color:"#00cfff" },
            ].map(({ title, data, color }) => (
              <div key={title} style={{ background:"#030d18", border:"1px solid #0a2030", borderRadius:6, padding:16 }}>
                <div style={{ fontSize:10, color:"#1a5060", letterSpacing:2, marginBottom:12,
                  display:"flex", justifyContent:"space-between" }}>
                  <span>{title}</span>
                  <StatusDot status={data?"online":backendStatus}/>
                </div>
                {data ? Object.entries(data).map(([k,v]) => (
                  <div key={k} className="trow">
                    <span style={{ color:"#2a6070" }}>{k}</span>
                    <span style={{ color, fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>
                      {typeof v==="object"?JSON.stringify(v).slice(0,40):String(v)}
                    </span>
                  </div>
                )) : (
                  <div style={{ color:"#1a4050", fontSize:11, lineHeight:1.8 }}>
                    {backendStatus==="checking"?"⏳ Fetching...":"No JSON data yet — add the route in api.rs"}
                  </div>
                )}
              </div>
            ))}
            <div style={{ gridColumn:"1/-1", background:"#030d18", border:"1px solid #0a2030", borderRadius:6, padding:16 }}>
              <div style={{ fontSize:10, color:"#1a5060", letterSpacing:2, marginBottom:12 }}>TOPOLOGY  /api/topology</div>
              {topology
                ? <pre style={{ color:"#3a8060", fontSize:11, margin:0, whiteSpace:"pre-wrap", overflowX:"auto" }}>{JSON.stringify(topology,null,2).slice(0,2000)}</pre>
                : <div style={{ color:"#1a4050", fontSize:11 }}>{backendStatus==="checking"?"⏳ Fetching...":"No data from /api/topology"}</div>
              }
            </div>
          </div>
        )}

        {tab==="debug" && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
            <div style={{ background:"#030d18", border:"1px solid #0a2030", borderRadius:6, padding:16 }}>
              <div style={{ fontSize:10, color:"#1a5060", letterSpacing:2, marginBottom:14 }}>BACKEND ENDPOINTS</div>
              {["/health","/api/nodes","/api/stats","/api/topology"].map(path => (
                <div key={path} className="trow">
                  <span style={{ color:"#00cfff", fontSize:11 }}>{API_BASE}{path}</span>
                  <EndpointStatus path={path}/>
                </div>
              ))}
            </div>
            <div style={{ background:"#030d18", border:"1px solid #0a2030", borderRadius:6, padding:16 }}>
              <div style={{ fontSize:10, color:"#1a5060", letterSpacing:2, marginBottom:8 }}>CONNECTION INFO</div>
              {[
                ["Backend",       API_BASE],
                ["Frontend",      "https://super-nodes.vercel.app"],
                ["Poll interval", "10 seconds"],
                ["Last sync",     lastUpdated??"—"],
                ["Status",        backendStatus],
              ].map(([l,v]) => (
                <div key={l} className="trow">
                  <span style={{ color:"#2a5060" }}>{l}</span>
                  <span style={{ color:"#00ff88" }}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function EndpointStatus({ path }) {
  const [status, setStatus] = useState("checking");
  useEffect(() => { apiFetch(path).then(r=>setStatus(r!==null?"online":"offline")); }, [path]);
  return <StatusDot status={status}/>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
