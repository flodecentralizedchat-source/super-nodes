<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperNode Dashboard - Live Backend</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .backend-status {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
      z-index: 9999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .backend-connected {
      background: #10b981;
      color: white;
    }
    .backend-disconnected {
      background: #ef4444;
      color: white;
    }
    .backend-connecting {
      background: #f59e0b;
      color: white;
    }
  </style>
</head>

<body style="margin: 0; padding: 0; background: #020810; font-family: 'Roboto Mono', sans-serif;">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    // ============================================================
    // CONFIGURATION - Update this to match your Fly.io deployment
    // ============================================================
    const BACKEND_CONFIG = {
     enabled: true, // Set to false to use simulated data
      wsUrl: 'wss://super-nodes.fly.dev/ws/algorithms',
      apiUrl: 'https://super-nodes.fly.dev/api',
      healthUrl: 'https://super-nodes.fly.dev/health',
      reconnectInterval: 5000, // 5 seconds
      maxReconnectAttempts: 10,
    };

    // ── Algorithm Definitions ──────────────────────────────────────
    const ALGOS = [
      { 
        id: 'dijkstra', 
        name: 'Dijkstra', 
        icon: '🎯', 
        desc: 'Shortest path between nodes',
        color: '#3b82f6' 
      },
      { 
        id: 'astar', 
        name: 'A*', 
        icon: '⭐', 
        desc: 'Heuristic pathfinding',
        color: '#8b5cf6' 
      },
      { 
        id: 'gossip', 
        name: 'Gossip', 
        icon: '💬', 
        desc: 'Epidemic message propagation',
        color: '#10b981' 
      },
      { 
        id: 'kruskal', 
        name: 'Kruskal MST', 
        icon: '🌳', 
        desc: 'Minimum spanning tree',
        color: '#f59e0b' 
      },
      { 
        id: 'bfs', 
        name: 'BFS', 
        icon: '📊', 
        desc: 'Breadth-first traversal',
        color: '#ef4444' 
      },
    ];

    // ── Main Dashboard Component ───────────────────────────────────
    function Dashboard() {
      // State from original dashboard
      const [activeAlgo, setActiveAlgo] = useState('dijkstra');
      const [simRunning, setSimRunning] = useState(false);
      const [routeStep, setRouteStep] = useState(0);
      const [activeRoute, setActiveRoute] = useState(null);
      const [gossipWave, setGossipWave] = useState([]);
      const [mstEdges, setMstEdges] = useState([]);
      const [bfsNodes, setBfsNodes] = useState([]);
      const [packets, setPackets] = useState(0);
      const [connections, setConnections] = useState(0);
      const [log, setLog] = useState([]);
      const [autoRotate, setAutoRotate] = useState(true);
      
      // Backend connection state
      const [backendStatus, setBackendStatus] = useState('disconnected'); // 'connecting' | 'connected' | 'disconnected'
      const [reconnectAttempts, setReconnectAttempts] = useState(0);
      
      const intervalRef = useRef(null);
      const rotationTimerRef = useRef(null);
      const svgRef = useRef(null);
      const wsRef = useRef(null);

      // Helper: Add log message
      const addLog = (msg) => setLog(l => [`${new Date().toLocaleTimeString()} › ${msg}`, ...l].slice(0, 15));

      // ============================================================
      // WebSocket Connection to Backend
      // ============================================================
      useEffect(() => {
        if (!BACKEND_CONFIG.enabled) {
          setBackendStatus('disabled');
          return;
        }

        const connectWebSocket = () => {
          setBackendStatus('connecting');
          addLog(`Connecting to backend: ${BACKEND_CONFIG.wsUrl}`);

          try {
            wsRef.current = new WebSocket(BACKEND_CONFIG.wsUrl);

            wsRef.current.onopen = () => {
              setBackendStatus('connected');
              setReconnectAttempts(0);
              addLog('✅ Connected to SuperNode backend');
            };

            wsRef.current.onmessage = (event) => {
              try {
                const eventData = JSON.parse(event.data);
                handleBackendEvent(eventData);
              } catch (e) {
                console.error('Failed to parse event:', e);
              }
            };

            wsRef.current.onerror = (error) => {
              console.error('WebSocket error:', error);
              addLog('❌ WebSocket error');
            };

            wsRef.current.onclose = () => {
              setBackendStatus('disconnected');
              addLog('🔌 Disconnected from backend');
              
              // Auto-reconnect
              if (reconnectAttempts < BACKEND_CONFIG.maxReconnectAttempts) {
                setTimeout(() => {
                  setReconnectAttempts(prev => prev + 1);
                  connectWebSocket();
                }, BACKEND_CONFIG.reconnectInterval);
              } else {
                addLog('⚠️ Max reconnect attempts reached. Using simulation.');
              }
            };
          } catch (e) {
            console.error('Connection error:', e);
            setBackendStatus('disconnected');
          }
        };

        connectWebSocket();

        return () => {
          if (wsRef.current) {
            wsRef.current.close();
            wsRef.current = null;
          }
        };
      }, []);

      // Handle events from backend
      const handleBackendEvent = (event) => {
        switch (event.type) {
          case 'algorithm_started':
            addLog(`🚀 Algorithm started: ${event.algorithm}`);
           break;
            
          case'path_found':
            setActiveRoute(event.path);
            setRouteStep(0);
            addLog(`✓ Path found: ${event.path.join(' → ')}`);
           break;
            
          case 'gossip_step':
            setGossipWave(event.infected_nodes);
            addLog(`💬 Gossip step ${event.step}: ${event.infected_nodes.length} nodes infected`);
           break;
            
          case 'mst_edge':
            setMstEdges(prev => [...prev, { 
              from: event.from, 
              to: event.to, 
              weight: event.weight 
            }]);
            addLog(`🌳 MST edge: ${event.from}-${event.to} (${event.weight.toFixed(2)})`);
           break;
            
          case 'bfs_visit':
            setBfsNodes(prev => [...prev, { 
              node: event.node, 
              distance: event.distance 
            }]);
           break;
            
          case 'algorithm_complete':
            setSimRunning(false);
            addLog(`✅ Algorithm complete: ${event.result_summary}`);
           break;
            
          case 'error':
            addLog(`❌ Error: ${event.message}`);
            setSimRunning(false);
           break;
            
          default:
            console.log('Unknown event:', event);
        }
      };

      // Animate connection counter (simulated for demo)
      useEffect(() => {
        const target = 8_000_000_000;
        let v = 0;
        const t = setInterval(() => {
          v = Math.min(v + 47_000_000 + Math.random() * 30_000_000, target);
          setConnections(Math.floor(v));
          if (v >= target) clearInterval(t);
        }, 50);
        return () => clearInterval(t);
      }, []);

      // Live packet counter
      useEffect(() => {
        const t = setInterval(() => {
          setPackets(p => p + Math.floor(800_000 + Math.random() * 400_000));
        }, 100);
        return () => clearInterval(t);
      }, []);

      // Auto-rotate through algorithms randomly
      useEffect(() => {
        if (!autoRotate || simRunning) return;

        const ALGO_IDS = ALGOS.map(a => a.id);
        
        const rotateAlgorithm = () => {
          // Pick random algorithm different from current
          let newAlgo;
          do {
            newAlgo = ALGO_IDS[Math.floor(Math.random() * ALGO_IDS.length)];
          } while (newAlgo === activeAlgo && ALGO_IDS.length > 1);
          
          setActiveAlgo(newAlgo);
          resetSim();
          
          // Auto-run simulation after brief delay
          setTimeout(() => {
           runSim();
          }, 500);
        };

        // Initial delay before first rotation
        rotationTimerRef.current = setTimeout(() => {
          rotateAlgorithm();
          
          // Continue rotating every 15 seconds
          rotationTimerRef.current = setInterval(rotateAlgorithm, 15000);
        }, 3000 + Math.random() * 2000);

        return () => {
          if (rotationTimerRef.current) {
            clearTimeout(rotationTimerRef.current);
            clearInterval(rotationTimerRef.current);
          }
        };
      }, [autoRotate, simRunning, activeAlgo]);

      const resetSim = () => {
        clearInterval(intervalRef.current);
        setSimRunning(false);
        setActiveRoute(null);
        setRouteStep(0);
        setGossipWave([]);
        setMstEdges([]);
        setBfsNodes([]);
      };

      const runSim = () => {
        resetSim();
        setSimRunning(true);
        addLog(`▶️ Running ${activeAlgo}...`);

        // Send request to backend via WebSocket
        if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
          wsRef.current.send(JSON.stringify({
            type: 'run_algorithm',
            algorithm: activeAlgo,
            params: {}
          }));
        } else {
          // Fallback to simulation if backend not available
          addLog('⚠️ Backend unavailable, using local simulation');
         runLocalSimulation();
        }
      };

      // Local simulation fallback (original implementation)
      const runLocalSimulation = () => {
        if (activeAlgo === "dijkstra" || activeAlgo === "astar") {
          const route = ["NA_W", "NA_E", "EU_W", "EU_E", "ME", "SA2", "EA"];
          setActiveRoute(route);
          let step = 0;
          intervalRef.current = setInterval(() => {
            setRouteStep(step++);
            if (step > route.length) {
              clearInterval(intervalRef.current);
              setSimRunning(false);
              addLog("✓ Route computed!");
            }
          }, 800);
        } else if (activeAlgo === "gossip") {
          let wave = [];
          let step = 0;
          intervalRef.current = setInterval(() => {
            wave = [...wave, `node_${step}`];
            setGossipWave(wave);
            step++;
            if (step > 10) {
              clearInterval(intervalRef.current);
              setSimRunning(false);
              addLog("✓ Gossip complete!");
            }
          }, 600);
        } else if (activeAlgo === "kruskal") {
          const edges = [
            { from: "NA_W", to: "EU_W", weight: 1.2 },
            { from: "EU_W", to: "ME", weight: 0.8 },
            { from: "ME", to: "SA2", weight: 1.5 },
          ];
          let idx = 0;
          intervalRef.current = setInterval(() => {
            if (idx < edges.length) {
              setMstEdges(e => [...e, edges[idx]]);
              idx++;
            } else {
              clearInterval(intervalRef.current);
              setSimRunning(false);
              addLog("✓ MST built!");
            }
          }, 1000);
        } else if (activeAlgo === "bfs") {
          const nodes = ["NA_W", "NA_E", "EU_W", "EU_E"];
          let idx = 0;
          intervalRef.current = setInterval(() => {
            if (idx < nodes.length) {
              setBfsNodes(n => [...n, { node: nodes[idx], distance: idx }]);
              idx++;
            } else {
              clearInterval(intervalRef.current);
              setSimRunning(false);
              addLog("✓ BFS done!");
            }
          }, 700);
        }
      };

      const toggleAutoRotate = () => {
        setAutoRotate(prev => !prev);
        addLog(autoRotate ? '⏸️ Auto-rotation paused' : '▶️ Auto-rotation resumed');
      };

      const getAlgoColor = () => ALGOS.find(a => a.id === activeAlgo)?.color || '#fff';

      return (
        <div style={{ minHeight: '100vh', color: '#fff' }}>
          {/* Backend Status Indicator */}
          <div className={`backend-status ${
            backendStatus === 'connected' ? 'backend-connected' :
            backendStatus === 'connecting' ? 'backend-connecting' : 'backend-disconnected'
          }`}>
            {backendStatus === 'connected' ? '🟢 Backend Connected' :
             backendStatus === 'connecting' ? '🟡 Connecting...' :
             backendStatus === 'disabled' ? '⚪ Simulation Mode' :
             '🔴 Backend Offline'}
          </div>

          {/* Header */}
          <header style={{ 
            background: 'linear-gradient(135deg, #1e3a8a, #0f172a)',
            padding: '24px 40px',
            borderBottom: '2px solid rgba(255,255,255,0.1)'
          }}>
            <h1 style={{ margin: 0, fontSize: '28px', fontWeight: 'bold' }}>
              🔷 SuperNode Dashboard
            </h1>
            <p style={{ margin: '8px 0 0', opacity: 0.7, fontSize: '14px' }}>
              Distributed Mesh Network • 8 Billion Devices
            </p>
            <div style={{ marginTop: '12px', fontSize: '13px', opacity: 0.9 }}>
              📦 Packets: <strong>{packets.toLocaleString()}</strong> | 
              🔗 Connections: <strong>{connections.toLocaleString()}</strong>
            </div>
          </header>

          {/* Rest of original dashboard continues here... */}
          {/* For now, reusing the existing dashboard structure */}
          
          <div style={{ padding: '40px' }}>
            <div style={{ 
              background: 'rgba(255,255,255,0.05)',
              borderRadius: '12px',
              padding: '24px',
              marginBottom: '24px'
            }}>
              <h2 style={{ margin: '0 0 16px', fontSize: '20px' }}>
                Algorithm Visualization
              </h2>
              
              <div style={{ marginBottom: '16px' }}>
                <button
                  onClick={toggleAutoRotate}
                  style={{
                    padding: '10px 20px',
                    background: autoRotate ? '#10b981' : '#6b7280',
                    color: 'white',
                    border: 'none',
                    borderRadius: '6px',
                    cursor: 'pointer',
                    marginRight: '12px',
                    fontWeight: 'bold'
                  }}
                >
                  {autoRotate ? '⏸️ Pause' : '▶️ Start'} Auto-Rotate
                </button>
                
                <button
                  onClick={runSim}
                  disabled={simRunning}
                  style={{
                    padding: '10px 20px',
                    background: simRunning ? '#6b7280' : getAlgoColor(),
                    color: 'white',
                    border: 'none',
                    borderRadius: '6px',
                    cursor: simRunning ? 'not-allowed' : 'pointer',
                    fontWeight: 'bold',
                    opacity: simRunning ? 0.6 : 1
                  }}
                >
                  {simRunning ? 'Running...' : `Run ${ALGOS.find(a => a.id === activeAlgo)?.name}`}
                </button>
              </div>

              <div style={{ 
                background: 'rgba(0,0,0,0.3)',
                borderRadius: '8px',
                padding: '16px',
                minHeight: '200px'
              }}>
                {simRunning ? (
                  <div style={{ textAlign: 'center', padding: '80px 20px' }}>
                    <div style={{ 
                      fontSize: '48px', 
                      animation: 'pulse 1s infinite' 
                    }}>
                      ⚙️
                    </div>
                    <p style={{ marginTop: '16px', fontSize: '16px', opacity: 0.8 }}>
                      Running {ALGOS.find(a => a.id === activeAlgo)?.name}...
                    </p>
                  </div>
                ) : (
                  <div style={{ textAlign: 'center', padding: '80px 20px', opacity: 0.5 }}>
                    <p>Select an algorithm to visualize</p>
                  </div>
                )}
              </div>
            </div>

            {/* Log Panel */}
            <div style={{ 
              background: 'rgba(255,255,255,0.05)',
              borderRadius: '12px',
              padding: '24px'
            }}>
              <h2 style={{ margin: '0 0 16px', fontSize: '20px' }}>Activity Log</h2>
              <div style={{ 
                background: 'rgba(0,0,0,0.3)',
                borderRadius: '8px',
                padding: '12px',
                maxHeight: '300px',
                overflowY: 'auto'
              }}>
                {log.map((entry, i) => (
                  <div key={i} style={{ 
                    padding: '6px 0',
                    borderBottom: i < log.length -1 ? '1px solid rgba(255,255,255,0.1)' : 'none',
                    fontFamily: 'monospace',
                    fontSize: '13px'
                  }}>
                    {entry}
                  </div>
                ))}
              </div>
            </div>
          </div>

          <style>{`
            @keyframes pulse {
              0%, 100% { opacity: 1; }
              50% { opacity: 0.5; }
            }
          `}</style>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
